name: CI — Tests + Build Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------------------------------
  # Job 1 : lancer les tests JUnit 5 avec Maven
  # -------------------------------------------------------
  test:
    name: Tests JUnit 5
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Lancer les tests JUnit 5
        run: mvn test -B

  # -------------------------------------------------------
  # Job 2 : build et push de l'image Docker sur ghcr.io
  # Se déclenche UNIQUEMENT si les tests passent
  # -------------------------------------------------------
  build-push:
    name: Build et Push Docker
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Login sur ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:latest
