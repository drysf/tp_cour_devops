apiVersion: v1
kind: Service
metadata:
  name: boutique
  namespace: default
  labels:
    app: boutique
spec:
  type: NodePort
  selector:
    app: boutique   # cible les Pods avec ce label
  ports:
    - protocol: TCP
      port: 80          # port exposé dans le cluster
      targetPort: 8080  # port du conteneur
      nodePort: 30080   # port accessible depuis l'hôte Minikube
