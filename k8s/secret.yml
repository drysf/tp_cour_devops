apiVersion: v1
kind: Secret
metadata:
  name: boutique-secret
  namespace: default
type: Opaque
data:
  # Valeurs encodées en base64 (valeurs de test pour le TP)
  # echo -n 'monUser' | base64       → bW9uVXNlcg==
  # echo -n 'monMotDePasse' | base64 → bW9uTW90RGVQYXNzZQ==
  DB_USER: bW9uVXNlcg==
  DB_PASSWORD: bW9uTW90RGVQYXNzZQ==
